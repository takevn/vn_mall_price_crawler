# Build Windows .exe trên GitHub (chạy trên runner Windows).
# Push code lên GitHub → Actions chạy → tải artifact .zip chứa exe + config.

name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Cho phép bấm "Run workflow" thủ công

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: 1
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pip install playwright
          playwright install chromium

      - name: Set UTF-8 encoding and build EXE
        shell: cmd
        run: |
          chcp 65001
          python -c "import sys; sys.stdout.reconfigure(encoding='utf-8')"
          pyinstaller --clean --onedir --noconfirm --noconsole --windowed ^
            --name "Supermarket Price Crawler" ^
            --add-data "Supermarket Price Crawler\config;Supermarket Price Crawler\config" ^
            --log-level=WARN ^
            "Supermarket Price Crawler.py"

      - name: Copy config folder to dist
        shell: cmd
        run: |
          REM Copy config vào vị trí chính (theo code tìm config)
          mkdir "dist\Supermarket Price Crawler\Supermarket Price Crawler\config"
          copy "Supermarket Price Crawler\config\DATA.csv" "dist\Supermarket Price Crawler\Supermarket Price Crawler\config\DATA.csv"
          copy "Supermarket Price Crawler\config\class_name.txt" "dist\Supermarket Price Crawler\Supermarket Price Crawler\config\class_name.txt"
          if exist "Supermarket Price Crawler\config\MALL_DOMAIN.csv" copy "Supermarket Price Crawler\config\MALL_DOMAIN.csv" "dist\Supermarket Price Crawler\Supermarket Price Crawler\config\MALL_DOMAIN.csv"
          REM Copy config vào vị trí fallback (nếu vị trí chính không tìm thấy)
          mkdir "dist\Supermarket Price Crawler\config"
          copy "Supermarket Price Crawler\config\DATA.csv" "dist\Supermarket Price Crawler\config\DATA.csv"
          copy "Supermarket Price Crawler\config\class_name.txt" "dist\Supermarket Price Crawler\config\class_name.txt"
          if exist "Supermarket Price Crawler\config\MALL_DOMAIN.csv" copy "Supermarket Price Crawler\config\MALL_DOMAIN.csv" "dist\Supermarket Price Crawler\config\MALL_DOMAIN.csv"
          echo Config files copied successfully

      - name: Verify config files
        shell: cmd
        run: |
          echo Checking primary config location...
          if exist "dist\Supermarket Price Crawler\Supermarket Price Crawler\config\DATA.csv" (
            echo ✅ DATA.csv found in primary location
          ) else (
            echo ❌ DATA.csv missing in primary location
            exit /b 1
          )
          if exist "dist\Supermarket Price Crawler\Supermarket Price Crawler\config\class_name.txt" (
            echo ✅ class_name.txt found in primary location
          ) else (
            echo ❌ class_name.txt missing in primary location
            exit /b 1
          )
          echo Checking fallback config location...
          if exist "dist\Supermarket Price Crawler\config\DATA.csv" (
            echo ✅ DATA.csv found in fallback location
          )
          if exist "dist\Supermarket Price Crawler\config\class_name.txt" (
            echo ✅ class_name.txt found in fallback location
          )

      - name: Upload artifact (EXE + config)
        uses: actions/upload-artifact@v4
        with:
          name: SupermarketPriceCrawler-Windows
          path: dist/Supermarket Price Crawler

      - name: Upload to Google Drive
        if: success()
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          SOURCE_DIR: dist/Supermarket Price Crawler
          ZIP_FILENAME: SupermarketPriceCrawler-Windows.zip
        run: |
          python -m pip install --upgrade pip
          pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client
          python upload_to_gdrive.py
