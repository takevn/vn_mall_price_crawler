# Build Windows .exe trên GitHub (chạy trên runner Windows).
# Push code lên GitHub → Actions chạy → tải artifact .zip chứa exe + config.

name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Cho phép bấm "Run workflow" thủ công

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pip install playwright
          playwright install chromium

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onedir ^
            --name "Supermarket Price Crawler" ^
            --add-data "Supermarket Price Crawler\config;Supermarket Price Crawler\config" ^
            "Supermarket Price Crawler.py"

      - name: Upload artifact (EXE + config)
        uses: actions/upload-artifact@v4
        with:
          name: SupermarketPriceCrawler-Windows
          path: dist/Supermarket Price Crawler
